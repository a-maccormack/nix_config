name: Build host

on:
  workflow_call:
    inputs:
      host:
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-25.11

      - name: Build ${{ inputs.host }}
        run: nix build .#nixosConfigurations.${{ inputs.host }}.config.system.build.toplevel --dry-run
